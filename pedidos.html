<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sense Belts | Pedidos</title>
    <link rel="stylesheet" href="css/pedidos.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <script type="module">//supabase
      import { createClient } from "https://esm.sh/@supabase/supabase-js";
      const supabaseUrl = "https://qtvsxbynddktnqiubelh.supabase.co/";
      const supabaseKey = "sb_publishable_D4q0NGJ69Iy94luhTagZQA_lk1mWTQT";
      window.supabase = createClient(supabaseUrl, supabaseKey);
    </script>
  </head>

  <body>
    <div class="menu">
      <div class="logo">
        <img src="image/logo.png" alt="logo da sense belts" />
        <p>Sistema de Vendas</p>
      </div>
      <nav>
        <a href="index.html"
          ><span class="material-symbols-outlined">home</span>Início</a
        >
        <a href="clientes.html"
          ><span class="material-symbols-outlined">group</span>Clientes</a
        >
        <a href="pedidos.html" class="ativo"
          ><span class="material-symbols-outlined">order_approve</span
          >Pedidos</a
        >
        <a href="produtos.html"
          ><span class="material-symbols-outlined">shopping_basket</span
          >Produtos</a>
        <a href="consultas.html"
          ><span class="material-symbols-outlined">area_chart</span>Consultas</a
        >
      </nav>
    </div>

    <div class="conteudo">
      <header>
        <h1>Novo Pedido</h1>
        <button>Finalizar Pedido</button>
      </header>

      <div class="card">
        <h2>Informações do Pedido</h2>

        <div class="grid3">
          <div>
            <label>Cliente</label>
            <select id="cliente">
              <option value="">Selecione...</option>
            </select>
          </div>

          <div>
            <label>Data do pedido</label>
            <input type="date" id="dataPedido" />
          </div>

          <div>
            <label>Pagamento</label>
            <select id="pagamento">
              <option value="">Selecione...</option>
              <option value="PIX">PIX</option>
              <option value="Cartão de Crédito">Cartão de Crédito</option>
              <option value="Cartão de Débito">Cartão de Débito</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Adicionar Produto</h2>

        <div class="grid4">
          <div>
            <label>Produto</label>
            <select id="produto">
              <option value="">Selecione...</option>
              <option value="faixa">Faixa</option>
              <option value="chaveiro">Chaveiro</option>
            </select>
          </div>

          <div id="faixa" class="aparecer">
            <div>
              <label>Modelo</label>
              <select id="modeloFaixa">
                <option value="">Selecione...</option>
                <option value="BELT OX STANDARD">BELT OX STANDARD 6 COSTURAS</option>
                <option value="BELT OX STANDARD">BELT OX STANDARD 8 COSTURAS</option>
                <option value="BELT BR STANDARD">BELT BR STANDARD 6 COSTURAS</option>
                <option value="BELT BR STANDARD">BELT BR STANDARD 8 COSTURAS</option>
                <option value="BELT BR PRO">BELT BR PRO</option>
                <option value="BELT BR PREMIUM">BELT BR PREMIUM</option>
              </select>
            </div>

            <div>
              <label>Modalidade</label>
              <select id="modalidadeFaixa">
                <option value="">Selecione...</option>
                <option value="Jiu-Jitsu">Jiu-Jitsu</option>
                <option value="Judô">Judô</option>
              </select>
            </div>

            <div>
              <label>Cor</label>
              <select id="corFaixa">
                <option value="">Selecione...</option>
                <option value="Branca">Branca</option>
                <option value="Cinza">Cinza</option>
                <option value="Azul">Azul</option>
                <option value="Amarela">Amarela</option>
                <option value="Laranja">Laranja</option>
                <option value="Verde">Verde</option>
                <option value="Roxa">Roxa</option>
                <option value="Marrom">Marrom</option>
                <option value="Preta">Preta</option>
                <option value="Vermelho">Vermelho</option>
              </select>
            </div>

            <div>
              <label>Personalizada?</label>
              <select id="personalizar">
                <option value="Não">Não</option>
                <option value="Sim">Sim</option>
              </select>
            </div>

            <div id="bordarFaixa" class="aparecer"> 
              <label>Nome para Bordar</label>
              <input type="text" id="nomePersonalizado" placeholder="Digite o nome"/>
            </div>
          </div>

          <div id="chaveiro" class="aparecer">
            <div>
              <label>Cor</label>
              <select id="corChaveiro">
                <option value="Branca">Branca</option>
                <option value="Cinza">Cinza</option>
                <option value="Azul">Azul</option>
                <option value="Amarela">Amarela</option>
                <option value="Laranja">Laranja</option>
                <option value="Verde">Verde</option>
                <option value="Roxa">Roxa</option>
                <option value="Marrom">Marrom</option>
                <option value="Preta">Preta</option>
                <option value="Vermelho">Vermelho</option>
              </select>
            </div>

            <div>
              <label>Modalidade</label>
              <select id="modalidadeChaveiro">
                <option value="">Selecione...</option>
                <option value="Jiu-Jitsu">Jiu-Jitsu</option>
                <option value="Judô">Judô</option>
              </select>
            </div>
          </div>

          <div>
            <label>Quantidade</label>
            <input type="number" id="quantidade" value="1" min="1"/>
          </div>

          <div>
            <label>&nbsp;</label>
            <button id="adicionar">Adicionar</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Itens do Pedido</h2>

        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Descrição</th>
              <th>Qtd.</th>
              <th>Preço</th>
              <th>Subtotal</th>
              <th>Ação</th>
            </tr>
          </thead>

          <tbody id="listaItens"></tbody>
        </table>
      </div>

      <div class="resumo">
        <div class="cardTotal">
          <h3>Total do Pedido</h3>
          <h1 id="valorTotal">R$ 0,00</h1>
        </div>
      </div>

    </div>

    <script src="js/pedidos.js"></script>
  </body>
</html>
